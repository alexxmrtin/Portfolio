server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Fallback de SPA: todas las rutas sirven index.html
    # para que react-router gestione la navegación.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cacheo agresivo de los assets con hash en el nombre.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Compresión gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
